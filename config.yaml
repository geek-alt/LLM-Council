ollama:
  base_url: http://localhost:11434
search:
  provider: searxng
  brave_api_key: ''
searxng:
  base_url: http://localhost:8080
  results_per_query: 4
  scrape_top_n: 2
  use_playwright: false
consensus:
  threshold: 0.998
  max_iterations: 6
council_features:
  enable_future_you_seat: true
state:
  dir: ./council_states
memory:
  enabled: true
  provider: mem0-oss-local
  user_id: local_user
  agent_id: llm_council
  top_k: 6
  ollama_base_url: http://localhost:11434
  llm_model: qwen35-9b
  embedder_model: nomic-embed-text
council:
- model_id: qwen3
  ollama_name: qwen3-14b
  display_name: Qwen-3 14B (Systematist)
  context_size: 8192
  temperature: 0.7
  personality: 'systematic thinker who builds structured frameworks, tracks dependencies,
    and reasons in clear layered steps

    '
- model_id: ministral
  ollama_name: ministral-14b
  display_name: Ministral-3 14B (Challenger)
  context_size: 8192
  temperature: 0.8
  personality: 'contrarian who aggressively challenges every assumption, hunts for
    edge cases, and refuses to accept incomplete arguments

    '
- model_id: phi4
  ollama_name: phi4-mini
  display_name: Phi-4 Mini (Pragmatist)
  context_size: 8192
  temperature: 0.62
  personality: 'practical implementer focused on feasibility, execution risk, and
    minimal-complexity plans that can ship quickly

    '
synthesizer:
  model_id: synthesizer
  ollama_name: gemma4-26b
  display_name: Gemma-4 26B-A4B (Synthesizer)
  context_size: 16384
  temperature: 0.65
researcher:
  ollama_name: qwen35-9b
  context_size: 4096
  temperature: 0.3
compressor:
  ollama_name: qwen35-9b
  context_size: 4096
  temperature: 0.2

# Academic Rehabilitation / Tutor Mode Configuration
academic_rehab:
  enabled: true
  native_language: Nepali
  target_language: Danish
  
  # Study modes: research, tutorial, drill, exam_prep
  default_mode: tutorial
  
  # Prerequisite enforcement
  prerequisite_blocking: true
  
  # Comprehension checking loop
  comprehension_checks: true
  
  # Danish terminology enforcement
  danish_terminology_enforcement: true
  
  # Spaced repetition for review questions
  spaced_repetition: true
  
  # HF curriculum tracking
  curriculum:
    subject: math_a
    topics_locked: []  # Topics blocked until prerequisites met
    topics_mastered: []
    
tutor_mode_council:
  - model_id: foundations
    ollama_name: qwen3-8b
    display_name: Prerequisites Guardian
    personality: "You are a strict diagnostic tutor. Before answering ANY question, you MUST verify the student knows the prerequisites. If they don't, stop and teach those first. Never skip steps."
  - model_id: examiner
    ollama_name: gemma4-9b
    display_name: HF Examiner
    personality: "You are a Danish HF censor (eksaminator). You evaluate answers based on HF rubrics: mathematical reasoning, method selection, and communication. Be critical but constructive."
  - model_id: explainer
    ollama_name: phi4-mini
    display_name: Simple Explainer
    personality: "You explain complex concepts using everyday analogies. When possible, relate to Nepali contexts or universal experiences. Focus on intuition over formalism."

tutor_mode_synthesizer:
  model_id: tutor_synthesizer
  ollama_name: gemma4-9b
  display_name: Gemma-4 9B (Tutor Synthesizer)
  context_size: 8192
  temperature: 0.65
